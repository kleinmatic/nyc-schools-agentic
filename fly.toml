# Fly.io app config. Update `app` to whatever name you actually got from
# `fly apps create` (nycschools may be taken; `nyc-schools-agentic` etc.
# are fallbacks).
app = "nycschools"
primary_region = "ewr"   # Newark, NJ — closest to NYC

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # Always-on. Cold-start was sub-2s but first-time visitors hitting the
  # spin-up read it as "broken." Keep one machine warm 24/7 — ~$7/mo at
  # shared-cpu-1x + 1GB.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"   # ~250 MB at startup; 1GB leaves headroom for pandas peaks
