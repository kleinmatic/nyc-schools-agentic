# Fly.io app config. Update `app` to whatever name you actually got from
# `fly apps create` (nycschools may be taken; `nyc-schools-agentic` etc.
# are fallbacks).
app = "nycschools"
primary_region = "ewr"   # Newark, NJ — closest to NYC

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # auto_stop saves money during idle (~$4/mo vs ~$10/mo always-on). Cold
  # start is sub-2s for our app shape — fine for a demo.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"   # ~250 MB at startup, plenty of headroom
