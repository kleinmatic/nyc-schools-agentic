{% extends "base.html" %}
{% block title %}Search NYC Schools{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-2">Find a school</h1>
<p class="text-sm text-slate-500 mb-6">By name (e.g. <em>Midwood High School</em>), short name (<em>PS 321</em>), or DBN (<em>15K321</em>).</p>

<form action="/search" method="get" class="mb-6">
  <input
    type="search"
    name="q"
    value="{{ query }}"
    autofocus
    autocomplete="off"
    placeholder="Type to search…"
    class="w-full px-4 py-3 border border-slate-300 rounded-lg shadow-sm focus:border-slate-500 focus:outline-none"
    hx-get="/search"
    hx-trigger="input changed delay:200ms, search"
    hx-target="#results"
    hx-swap="innerHTML"
    hx-push-url="true"
  >
</form>

<div id="results">
  {% include "partials/results.html" %}
</div>
{% endblock %}
